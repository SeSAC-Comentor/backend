services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commento
      POSTGRES_PASSWORD: commento
      POSTGRES_DB: commento
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: griotold/commento:2.0.0
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://commento:commento@db:5432/commento
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:3000}
      ENV: production

volumes:
  pgdata:
